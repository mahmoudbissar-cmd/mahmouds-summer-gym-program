<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Not found — V-Taper Program</title>
  <meta name="theme-color" content="#0E0F11" />
  <style>
    :root { color-scheme: light dark; --bg: #F6F5F1; --fg: #101113; --muted: #4A4B4F; --red: #D93A2B; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0E0F11; --fg: #F4F3EF; --muted: #9A9B9F; --red: #FF5646; }
    }
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: grid; place-items: center; text-align: center;
      padding: 24px; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    .box { max-width: 32ch; }
    h1 { font-size: 56px; letter-spacing: 0.02em; }
    h1 .dot { color: var(--red); }
    p { color: var(--muted); font-size: 15px; line-height: 1.5; margin: 8px 0 20px; }
    a {
      display: inline-block; font-weight: 600; text-decoration: none; color: #fff;
      background: var(--red); border-radius: 10px; padding: 11px 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404<span class="dot">.</span></h1>
    <p>That page doesn't exist. Head back to your training program.</p>
    <!-- Relative link works whether the site is at a domain root or a project sub-path -->
    <a href="./">Back to the program</a>
  </div>
</body>
</html>
