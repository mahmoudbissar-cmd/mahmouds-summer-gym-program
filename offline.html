<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Offline — V-Taper Program</title>
  <meta name="theme-color" content="#0E0F11" />
  <style>
    :root { color-scheme: light dark; --bg: #F6F5F1; --fg: #101113; --muted: #4A4B4F; --red: #D93A2B; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0E0F11; --fg: #F4F3EF; --muted: #9A9B9F; --red: #FF5646; }
    }
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: grid; place-items: center; text-align: center;
      padding: 24px; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    .box { max-width: 32ch; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .dot { color: var(--red); }
    p { color: var(--muted); font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
    button {
      font: inherit; font-weight: 600; cursor: pointer; color: #fff; background: var(--red);
      border: none; border-radius: 10px; padding: 11px 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>You're offline<span class="dot">.</span></h1>
    <p>The program couldn't load because there's no connection and it isn't cached yet. Reconnect and try again.</p>
    <button type="button" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
